{% extends "layout.html" %}

{% block title %}Health Logs | Health AirSense{% endblock %}

{% block content %}
<div class="card">
    <div class="stepper">
        <div class="step completed">
            <div class="step-num">1</div>
            <div class="step-label">Identify</div>
        </div>
        <div class="step-line" style="background: var(--accent);"></div>
        <div class="step active">
            <div class="step-num">2</div>
            <div class="step-label">Analysis</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
            <div class="step-num">3</div>
            <div class="step-label">Sync</div>
        </div>
    </div>

    <h1>Relational Health Logs</h1>
    <p class="subtitle">Log physiological data for correlation with localized air quality metrics.</p>

    <form action="/health-status" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="person_id">Target Personnel</label>
                <div class="input-wrapper">
                    <select id="person_id" name="person_id" required>
                        <option value="" disabled selected>Select from database...</option>
                        {% for person in persons %}
                        <option value="{{ person.id }}" {% if selected_id|string == person.id|string %}selected{% endif %}>
                            {{ person.name }} (ID: {{ person.id }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="record_date">Capture Date</label>
                <div class="input-wrapper">
                    <input type="date" id="record_date" name="record_date" required>
                </div>
            </div>

            <div class="form-group">
                <label for="blood_group">Blood Group</label>
                <div class="input-wrapper">
                    <select id="blood_group" name="blood_group" required>
                        <option value="" disabled selected>Select Type</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="status">Health Classification</label>
                <div class="input-wrapper">
                    <select id="status" name="status" required>
                        <option value="Active">Stable / Active</option>
                        <option value="Recovered">Recovered</option>
                        <option value="Critical">Requires Attention</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
            <label for="conditions">Known Pathologies / Symptoms</label>
            <div class="input-wrapper">
                <textarea id="conditions" name="conditions" rows="3" placeholder="Describe symptoms or ongoing conditions for AirSense correlation..."></textarea>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 2.5rem;">
            <label for="medications">Active Medications</label>
            <div class="input-wrapper">
                <textarea id="medications" name="medications" rows="2" placeholder="List medications relevant to respiratory or cardiovascular health..."></textarea>
            </div>
        </div>
        
        <div style="display: flex; justify-content: flex-end;">
            <button type="submit" id="submit-health-record">Sync Data Point →</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('record_date').valueAsDate = new Date();
</script>
{% endblock %}
