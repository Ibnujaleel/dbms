{% extends "layout.html" %}

{% block title %}Register | Health AirSense{% endblock %}

{% block content %}
<div class="card">
    <div class="stepper">
        <div class="step active">
            <div class="step-num">1</div>
            <div class="step-label">Identify</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
            <div class="step-num">2</div>
            <div class="step-label">Analysis</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
            <div class="step-num">3</div>
            <div class="step-label">Sync</div>
        </div>
    </div>

    <h1>Initialize Health Profile</h1>
    <p class="subtitle">Securely register personnel to the AirSense monitoring environment.</p>

    <form action="/add-person" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="name">Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="name" name="name" placeholder="Enter patient name" required>
                </div>
            </div>
            <div class="form-group">
                <label for="age">Current Age</label>
                <div class="input-wrapper">
                    <input type="number" id="age" name="age" placeholder="Years" min="0" max="120" required>
                </div>
            </div>
            <div class="form-group">
                <label for="gender">Gender Identity</label>
                <div class="input-wrapper">
                    <select id="gender" name="gender" required>
                        <option value="" disabled selected>Select option</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="phone">Contact Number</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
                </div>
            </div>
            <div class="form-group" style="grid-column: span 1;">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="name@company.com" required>
                </div>
            </div>
        </div>
        
        <div style="display: flex; justify-content: flex-end;">
            <button type="submit" id="submit-person">Proceed to Step 2 →</button>
        </div>
    </form>
</div>
{% endblock %}
